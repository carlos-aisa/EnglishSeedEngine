name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      DOTNET_NOLOGO: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            **/*.csproj
            global.json

      - name: Restore
        run: dotnet restore EnglishSeedEngine.sln

      - name: Build
        run: dotnet build EnglishSeedEngine.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test EnglishSeedEngine.sln --configuration Release --no-build --verbosity normal

